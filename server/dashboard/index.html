<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- CSP: sha256 hash covers the inline theme-init script below -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'sha256-wRP+cw0c87nYUgWJFgfT6Gj93S0e8l3rvheikMXnqrs=';">
  <title>Lattice</title>
  <link rel="stylesheet" href="/style.css">
  <!-- Theme-init: reads localStorage before first paint to prevent FOUC -->
  <script>(function(){var t=localStorage.getItem("lattice_theme");var d=t==="dark"||(!t&&matchMedia("(prefers-color-scheme:dark)").matches);if(d)document.documentElement.classList.add("theme-dark")})();</script>
</head>
<body>

  <!-- Auth screen -->
  <div id="auth-screen" class="auth-screen" hidden>
    <button class="theme-toggle auth-theme-toggle" id="auth-theme-toggle" type="button" title="Toggle theme">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
    <form class="auth-form" id="auth-form">
      <h1>Lattice</h1>
      <p>Enter your API token to access the dashboard.</p>
      <input type="password" id="token-input" placeholder="Bearer token" autocomplete="off" required>
      <button type="submit">Connect</button>
    </form>
  </div>

  <!-- Main app -->
  <div id="app" class="app" hidden>
    <div class="error-banner" id="error-banner">Unable to reach the Lattice API</div>

    <header class="topbar">
      <span class="topbar-brand">Lattice</span>
      <div class="topbar-actions">
        <span class="last-updated" id="last-updated"></span>
        <button class="theme-toggle" id="app-theme-toggle" type="button" title="Toggle theme">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <button class="btn-logout" id="btn-logout">Logout</button>
      </div>
    </header>

    <nav class="tab-nav" id="tab-nav">
      <button data-view="projects" class="active">Projects</button>
      <button data-view="active">Active Sessions</button>
      <div class="tab-nav-spacer"></div>
      <select id="device-filter" class="device-filter" title="Filter by device">
        <option value="">All devices</option>
      </select>
    </nav>

    <main class="main">
      <!-- Projects view -->
      <div class="view active" id="view-projects">
        <div class="card-grid" id="project-list"></div>
        <div class="empty-state" id="projects-empty" hidden>
          <p>No projects tracked yet. Start a Claude Code session to begin.</p>
        </div>
      </div>

      <!-- Active sessions view -->
      <div class="view" id="view-active">
        <div class="card-grid" id="session-list"></div>
        <div class="empty-state" id="sessions-empty" hidden>
          <p>No active sessions right now.</p>
        </div>
      </div>

      <!-- Project detail view -->
      <div class="view" id="view-detail"></div>
    </main>
  </div>

  <!-- Templates -->
  <template id="tpl-project-card">
    <div class="card" data-id="">
      <div class="card-header">
        <span class="card-title" data-field="name"></span>
        <span class="badge" data-field="status"></span>
      </div>
      <div class="card-meta">
        <span data-field="tag"></span>
        <span data-field="activity"></span>
        <span data-field="device"></span>
      </div>
      <span class="card-branch" data-field="branch"></span>
    </div>
  </template>

  <template id="tpl-session-card">
    <div class="card" data-id="">
      <div class="card-header">
        <span class="card-title" data-field="project"></span>
        <span class="badge" data-field="status"></span>
      </div>
      <div class="card-meta">
        <span data-field="device"></span>
        <span data-field="interface"></span>
        <span data-field="started" data-time=""></span>
      </div>
    </div>
  </template>

  <script src="/app.js"></script>
</body>
</html>
